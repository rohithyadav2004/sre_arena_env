# Real L4 training — ~6-8 hours on L4
num_generations: 3

per_generation:
  - {role: 'defender', episodes: 200}  # Gen 0: train defender vs scripted attacker
  - {role: 'attacker', episodes: 200}  # Gen 1: train attacker vs scripted defender
  - {role: 'defender', episodes: 200}  # Gen 2: train defender vs Gen-1 attacker (Phase 7)

model:
  name: "Qwen/Qwen2.5-3B-Instruct"
  load_in_4bit: true
  bnb_4bit_compute_dtype: "bfloat16"

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]
  bias: "none"
  task_type: "CAUSAL_LM"

training:
  num_episodes: 200
  rollouts_per_episode: 8

  learning_rate: 5.0e-5
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  warmup_steps: 20
  max_grad_norm: 0.5

  max_new_tokens: 200
  temperature: 0.7
  top_p: 0.9

  save_steps: 50
  output_dir: "./checkpoints/l4_run"

  logging_steps: 5
  report_to: "tensorboard"

env:
  task_id: "task1"
  base_seed: 42
